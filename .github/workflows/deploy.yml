name: CI/CD Portfolio Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Clonar el repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # Paso 2: Configurar Node.js v20
    - name: Configurar Node.js v20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # Paso 3: Instalar pnpm
    - name: Instalar pnpm
      run: npm install -g pnpm

    # Paso 4: Instalar dependencias
    - name: Instalar dependencias
      run: pnpm install --no-frozen-lockfile

    # Paso 5: Compilar el proyecto
    - name: Compilar proyecto (Build)
      run: pnpm run build

    # ==========================================
    # Autenticarse en AWS
    # ==========================================
    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-3

    # Paso de prueba: Ver si AWS nos reconoce
    - name: Probar conexión con AWS
      run: aws sts get-caller-identity